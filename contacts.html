<style>
  /* Контакты в едином стиле сайта (на токенах --ink/--gray/--r из styles.css) */
  .custom-vocal-homepage .cvh-contacts-grid{
    display:grid;grid-template-columns:1fr;gap:clamp(16px,1.6vw,24px);
    max-width:980px;margin:clamp(48px,6vw,80px) auto 0;
  }
  @media(min-width:680px){.custom-vocal-homepage .cvh-contacts-grid{grid-template-columns:repeat(2,1fr);}}

  .custom-vocal-homepage .cvh-contact{
    position:relative;display:flex;align-items:center;gap:clamp(16px,1.8vw,22px);
    padding:clamp(22px,2.4vw,30px);border-radius:var(--r);
    background:var(--white);border:1px solid var(--line-10);overflow:hidden;isolation:isolate;
    transition:transform .55s var(--ease),box-shadow .55s var(--ease),border-color .55s var(--ease);
  }
  .custom-vocal-homepage .cvh-contact>*{position:relative;z-index:1;}
  .custom-vocal-homepage .cvh-contact::before{
    content:"";position:absolute;inset:0;z-index:0;background:var(--ink);
    transform:translateY(101%);transition:transform .6s var(--ease);
  }
  .custom-vocal-homepage .cvh-contact:hover::before{transform:translateY(0);}
  .custom-vocal-homepage .cvh-contact:hover{transform:translateY(-4px);border-color:var(--ink);box-shadow:0 30px 60px -30px rgba(0,0,0,.42);}

  .custom-vocal-homepage .cvh-contact-ico{
    flex:none;width:56px;height:56px;border-radius:999px;border:1px solid var(--line-20);
    display:flex;align-items:center;justify-content:center;color:var(--ink);
    transition:color .5s var(--ease),border-color .5s var(--ease),transform .55s var(--ease);
  }
  .custom-vocal-homepage .cvh-contact:hover .cvh-contact-ico{color:var(--white);border-color:rgba(255,255,255,.3);transform:scale(1.05);}
  .custom-vocal-homepage .cvh-contact-ico svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

  .custom-vocal-homepage .cvh-contact-info{flex:1;min-width:0;}
  .custom-vocal-homepage .cvh-contact-name{font-size:17px;font-weight:500;letter-spacing:-.01em;color:var(--ink);transition:color .5s var(--ease);}
  .custom-vocal-homepage .cvh-contact:hover .cvh-contact-name{color:var(--white);}
  .custom-vocal-homepage .cvh-contact-desc{font-size:14px;font-weight:300;color:var(--gray);margin-top:4px;line-height:1.4;transition:color .5s var(--ease);}
  .custom-vocal-homepage .cvh-contact:hover .cvh-contact-desc{color:rgba(255,255,255,.72);}

  .custom-vocal-homepage .cvh-contact-arrow{
    flex:none;color:var(--ink);opacity:0;transform:translateX(-8px);
    transition:opacity .5s var(--ease),transform .5s var(--ease),color .5s var(--ease);display:flex;
  }
  .custom-vocal-homepage .cvh-contact:hover .cvh-contact-arrow{opacity:1;transform:translateX(0);color:var(--white);}
  .custom-vocal-homepage .cvh-contact-arrow svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* лёгкий каскад появления карточек */
  .custom-vocal-homepage .cvh-contacts-grid .cvh-x:nth-child(2){transition-delay:.07s;}
  .custom-vocal-homepage .cvh-contacts-grid .cvh-x:nth-child(3){transition-delay:.14s;}
  .custom-vocal-homepage .cvh-contacts-grid .cvh-x:nth-child(4){transition-delay:.21s;}
  .custom-vocal-homepage .cvh-contacts-grid .cvh-x:nth-child(5){transition-delay:.28s;}
</style>

<!-- Скрипты: меню + появление при скролле -->
<script>
(function(){
  var root = document.querySelector('.custom-vocal-homepage');
  var burger = document.getElementById('cvhBurger');
  var menu = document.getElementById('cvhMenu');
  var closeBtn = document.getElementById('cvhMenuClose');

  /* МЕНЮ */
  if(root && burger && menu){
    function setOpen(open){
      burger.classList.toggle('is-open', open);
      menu.classList.toggle('is-open', open);
      root.classList.toggle('cvh-menu-open', open);
      document.body.style.overflow = open ? 'hidden' : '';
      burger.setAttribute('aria-expanded', open ? 'true' : 'false');
      burger.setAttribute('aria-label', open ? 'Закрыть меню' : 'Открыть меню');
      menu.setAttribute('aria-hidden', open ? 'false' : 'true');
    }
    burger.addEventListener('click', function(){ setOpen(!menu.classList.contains('is-open')); });
    if(closeBtn) closeBtn.addEventListener('click', function(){ setOpen(false); });
    menu.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', function(){ setOpen(false); }); });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && menu.classList.contains('is-open')) setOpen(false); });

    if(!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)){
      var glyphs = 'АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЭЮЯ';
      document.querySelectorAll('.cvh-nav-links a').forEach(function(link){
        var finalText = link.textContent.trim();
        link.addEventListener('mouseenter', function(){
          var pos = 0; clearInterval(link._iv);
          link._iv = setInterval(function(){
            link.textContent = finalText.split('').map(function(ch,i){
              return ch === ' ' ? ' ' : (i < pos ? finalText[i] : glyphs[Math.floor(Math.random()*glyphs.length)]);
            }).join('');
            pos += 1/2;
            if(pos >= finalText.length){ clearInterval(link._iv); link.textContent = finalText; }
          }, 38);
        });
        link.addEventListener('mouseleave', function(){ clearInterval(link._iv); link.textContent = finalText; });
      });
    }
  }

  /* ПОЯВЛЕНИЕ ПРИ СКРОЛЛЕ */
  var items = document.querySelectorAll('.cvh-reveal, .cvh-x');
  if(!('IntersectionObserver' in window) || !items.length){
    items.forEach(function(el){ el.classList.add('cvh-in'); });
    return;
  }
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('cvh-in'); io.unobserve(e.target); }
    });
  }, { threshold:.12, rootMargin:'0px 0px -8% 0px' });
  items.forEach(function(el){ io.observe(el); });
})();
</script>
